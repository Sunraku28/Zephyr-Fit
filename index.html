<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zephyr · Fit AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>

<style>
  :root{
    --void: #05070d;
    --void-2: #0a0f1e;
    --panel: rgba(14,19,33,.58);
    --panel-2: rgba(14,19,33,.82);
    --panel-border: rgba(150,170,255,.16);
    --cyan: #2fe6ff;
    --cyan-soft: rgba(47,230,255,.35);
    --purple: #b24bff;
    --purple-soft: rgba(178,75,255,.38);
    --orange: #ff8c3d;
    --red: #ff4d5e;
    --green: #35ffa0;
    --green-soft: rgba(53,255,160,.35);
    --text: #eaf0ff;
    --text-dim: #8b93ad;
    --text-dimmer: #565f78;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh; background:var(--void); color:var(--text);
    font-family:var(--sans); overflow-x:hidden; position:relative;
    -webkit-font-smoothing:antialiased;
  }
  #root{position:relative; min-height:100vh; z-index:1;}

  ::selection{ background:var(--purple-soft); color:#fff; }
  :focus-visible{ outline:2px solid var(--cyan); outline-offset:3px; }
  button{ font-family:inherit; }

  /* ---------- Ambient background ---------- */
  .ambient{ position:fixed; inset:0; z-index:0; overflow:hidden; background:
      radial-gradient(ellipse at 20% 15%, #121a34 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, #170f2b 0%, transparent 55%),
      var(--void);
  }
  .orb{ position:absolute; border-radius:50%; filter:blur(60px); animation:pulseOrb 7s ease-in-out infinite; }
  .orb.o1{ width:420px; height:420px; top:-120px; left:-100px; background:radial-gradient(circle, var(--purple-soft), transparent 70%); }
  .orb.o2{ width:520px; height:520px; bottom:-160px; right:-140px; background:radial-gradient(circle, var(--cyan-soft), transparent 70%); animation-delay:1.4s;}
  .orb.o3{ width:300px; height:300px; top:40%; left:60%; background:radial-gradient(circle, rgba(255,140,61,.20), transparent 70%); animation-delay:2.6s;}
  .grid-overlay{ position:absolute; inset:0; background-image:
      linear-gradient(rgba(140,160,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,160,255,.05) 1px, transparent 1px);
      background-size:42px 42px; mask-image:radial-gradient(ellipse at center, black 40%, transparent 85%);
  }
  .scanline{ position:absolute; left:0; right:0; height:140px; background:linear-gradient(rgba(47,230,255,0), rgba(47,230,255,.05), rgba(47,230,255,0)); animation:scanline 9s linear infinite; }
  @keyframes pulseOrb{ 0%,100%{transform:scale(1); opacity:.5;} 50%{transform:scale(1.18); opacity:.85;} }
  @keyframes scanline{ 0%{ transform:translateY(-160px);} 100%{ transform:translateY(110vh);} }

  /* ---------- Wipe transition ---------- */
  .wipe-overlay{ position:fixed; inset:0; z-index:90; pointer-events:none;
    background:linear-gradient(120deg, var(--purple) 0%, var(--cyan) 55%, var(--green) 100%);
    transform:translateX(-100%); transition:transform .55s cubic-bezier(.76,0,.24,1);
  }
  .wipe-overlay::after{ content:''; position:absolute; inset:0; opacity:.25;
    background:repeating-linear-gradient(115deg, rgba(0,0,0,.35) 0 3px, transparent 3px 22px); }
  .wipe-overlay.cover{ transform:translateX(0%); }
  .wipe-overlay.idle-right{ transform:translateX(100%); }
  .wipe-overlay.idle-left{ transform:translateX(-100%); }
  .wipe-overlay.no-transition{ transition:none; }

  /* ---------- Layout shells ---------- */
  .screen{ position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px 48px; animation:fadeUp .55s ease both; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }

  .glass{ background:var(--panel); border:1px solid var(--panel-border); border-radius:20px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04); }

  .top-nav{ position:fixed; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:16px 26px; }
  .back-btn{ display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--panel-border); color:var(--text-dim); padding:9px 14px; border-radius:999px; cursor:pointer; font-size:13px; letter-spacing:.03em; transition:all .2s; }
  .back-btn:hover{ color:var(--cyan); border-color:var(--cyan-soft); box-shadow:0 0 16px rgba(47,230,255,.15); }
  .hud-pill{ display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--panel-border); padding:8px 16px; border-radius:999px; font-family:var(--mono); font-size:13px; color:var(--green); }
  .hud-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); }

  /* ---------- Bio-core signature emblem ---------- */
  .biocore{ position:relative; width:120px; height:120px; margin:0 auto 6px; }
  .biocore svg{ width:100%; height:100%; }
  .biocore .ring-outer{ animation:spin 18s linear infinite; transform-origin:60px 60px; }
  .biocore .ring-inner{ animation:spin 12s linear infinite reverse; transform-origin:60px 60px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Typography ---------- */
  .brand-title{ font-size:clamp(40px,7vw,58px); font-weight:800; letter-spacing:.02em; margin:0; text-align:center;
    background:linear-gradient(90deg, var(--cyan), var(--purple)); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 50px rgba(178,75,255,.25); }
  .brand-sub{ text-align:center; color:var(--text-dim); font-family:var(--mono); letter-spacing:.35em; font-size:12px; text-transform:uppercase; margin:2px 0 26px; }
  .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--cyan); margin:0 0 6px; }
  .step-title{ font-size:clamp(24px,4vw,32px); font-weight:800; letter-spacing:.01em; margin:0 0 4px; }
  .step-desc{ color:var(--text-dim); font-size:14.5px; margin:0 0 28px; max-width:520px; }

  /* ---------- XP Header ---------- */
  .quest-header{ width:100%; max-width:760px; margin:0 auto 34px; }
  .quest-header-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .quest-header-label{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-dim); }
  .quest-header-count{ font-family:var(--mono); font-size:12px; color:var(--cyan); }
  .xp-track{ height:8px; border-radius:999px; background:rgba(255,255,255,.06); overflow:hidden; border:1px solid var(--panel-border); position:relative; }
  .xp-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--purple), var(--cyan)); box-shadow:0 0 14px var(--cyan-soft); transition:width .6s cubic-bezier(.65,0,.35,1); }

  /* ---------- Form fields (Login) ---------- */
  .login-card{ width:100%; max-width:420px; padding:40px 34px 34px; }
  .field{ position:relative; margin-bottom:22px; }
  .field input{ width:100%; background:rgba(255,255,255,.03); border:1.5px solid rgba(150,170,255,.18); border-radius:12px; padding:20px 16px 8px; color:var(--text); font-size:15px; transition:all .25s; }
  .field input:focus{ border-color:var(--purple); box-shadow:0 0 0 4px var(--purple-soft), 0 0 22px var(--purple-soft); outline:none; }
  .field input.valid{ border-color:var(--green); box-shadow:0 0 0 4px var(--green-soft), 0 0 18px var(--green-soft); }
  .field label{ position:absolute; left:16px; top:16px; color:var(--text-dimmer); font-size:15px; pointer-events:none; transition:all .18s; }
  .field input:focus + label, .field input.has-val + label{ top:6px; font-size:11px; letter-spacing:.06em; color:var(--cyan); text-transform:uppercase; }
  .field .check{ position:absolute; right:14px; top:16px; color:var(--green); opacity:0; transition:opacity .2s; }
  .field input.valid ~ .check{ opacity:1; }

  .cta-button{ width:100%; padding:17px 20px; border:none; border-radius:14px; cursor:pointer; font-weight:800; letter-spacing:.06em; text-transform:uppercase; font-size:14.5px; color:#04121a;
    background:linear-gradient(90deg, var(--purple), var(--purple)); box-shadow:0 0 22px var(--purple-soft); transition:all .35s ease; position:relative; overflow:hidden; }
  .cta-button:not(:disabled):hover{ background:linear-gradient(90deg, var(--purple), var(--cyan)); box-shadow:0 0 32px var(--cyan-soft), 0 0 60px var(--purple-soft); transform:translateY(-2px); }
  .cta-button:disabled{ opacity:.35; cursor:not-allowed; box-shadow:none; }
  .cta-sub{ text-align:center; font-size:12px; color:var(--text-dimmer); margin-top:14px; }

  /* ---------- Vitals (age + weight) ---------- */
  .vitals-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:22px; width:100%; max-width:760px; }
  @media(max-width:720px){ .vitals-grid{ grid-template-columns:1fr; } }
  .panel-box{ padding:26px; }
  .panel-label{ font-family:var(--mono); font-size:11.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-dim); margin:0 0 18px; text-align:center; }

  .age-wheel-wrap{ position:relative; }
  .age-readout{ text-align:center; font-family:var(--mono); font-size:44px; font-weight:700; color:var(--cyan); text-shadow:0 0 22px var(--cyan-soft); margin-bottom:6px; }
  .age-readout span{ font-size:14px; color:var(--text-dim); margin-left:6px; }
  .age-scroller{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; padding:0 calc(50% - 32px); gap:0; -ms-overflow-style:none; scrollbar-width:none; height:70px; align-items:center;
    mask-image:linear-gradient(90deg, transparent, black 20%, black 80%, transparent);
    -webkit-mask-image:linear-gradient(90deg, transparent, black 20%, black 80%, transparent); }
  .age-scroller::-webkit-scrollbar{ display:none; }
  .age-item{ flex:0 0 64px; scroll-snap-align:center; text-align:center; font-family:var(--mono); color:var(--text-dimmer); font-size:16px; transition:all .2s; user-select:none; }
  .age-item.center{ color:var(--cyan); font-size:22px; font-weight:700; }
  .age-ticks{ display:flex; justify-content:center; gap:10px; margin-top:8px; }
  .age-nudge{ background:rgba(255,255,255,.04); border:1px solid var(--panel-border); color:var(--text-dim); border-radius:999px; width:34px; height:34px; cursor:pointer; transition:all .2s; }
  .age-nudge:hover{ color:var(--cyan); border-color:var(--cyan-soft); }
  .age-center-marker{ position:absolute; left:50%; top:0; bottom:0; width:2px; background:linear-gradient(var(--cyan), transparent); transform:translateX(-50%); opacity:.5; pointer-events:none; }

  .gauge-row{ display:flex; align-items:center; justify-content:center; gap:22px; }
  .vgauge-wrap{ width:54px; height:230px; position:relative; display:flex; align-items:center; justify-content:center; }
  .vgauge-track{ position:absolute; width:14px; height:100%; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid var(--panel-border); overflow:hidden; }
  .vgauge-fill{ position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(180deg, var(--cyan), var(--purple)); box-shadow:0 0 16px var(--cyan-soft); transition:height .12s linear; border-radius:999px; }
  .vgauge-wrap input[type=range]{ position:absolute; width:230px; height:36px; transform:rotate(-90deg); -webkit-appearance:none; background:transparent; margin:0; z-index:2; }
  .vgauge-wrap input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff, var(--cyan) 60%); box-shadow:0 0 0 4px rgba(47,230,255,.25), 0 0 18px var(--cyan-soft); cursor:grab; }
  .vgauge-wrap input[type=range]::-moz-range-thumb{ width:30px; height:30px; border:none; border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff, var(--cyan) 60%); box-shadow:0 0 0 4px rgba(47,230,255,.25), 0 0 18px var(--cyan-soft); cursor:grab; }
  .vgauge-wrap input[type=range]::-webkit-slider-runnable-track{ background:transparent; height:36px; }
  .weight-readout{ text-align:center; }
  .weight-readout .num{ font-family:var(--mono); font-size:34px; font-weight:700; color:var(--text); }
  .weight-readout .unit{ font-family:var(--mono); font-size:14px; color:var(--purple); letter-spacing:.1em; }
  .weight-scale-labels{ display:flex; flex-direction:column; justify-content:space-between; height:230px; font-family:var(--mono); font-size:10px; color:var(--text-dimmer); }

  /* ---------- Fuel Protocol (diet cards) ---------- */
  .fuel-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; max-width:640px; }
  @media(max-width:560px){ .fuel-grid{ grid-template-columns:1fr; } }
  .fuel-card{ padding:34px 20px; text-align:center; cursor:pointer; border:1.5px solid rgba(150,170,255,.10); filter:saturate(.6) brightness(.75); opacity:.68; transition:all .25s; }
  .fuel-card:hover{ transform:translateY(-3px) scale(1.015); }
  .fuel-card.active{ border-color:var(--green); box-shadow:0 0 0 1px var(--green-soft), 0 0 34px var(--green-soft); filter:none; opacity:1; }
  .fuel-card.bounce{ animation:bounceIn .45s ease; }
  .fuel-icon{ width:56px; height:56px; margin:0 auto 14px; color:var(--text-dim); transition:color .25s; }
  .fuel-card.active .fuel-icon{ color:var(--green); }
  .fuel-name{ font-weight:800; letter-spacing:.08em; font-size:16px; margin:0 0 4px; }
  .fuel-sub{ font-size:12.5px; color:var(--text-dim); margin:0; }
  @keyframes bounceIn{ 0%{transform:scale(1);} 35%{transform:scale(.93);} 62%{transform:scale(1.07);} 100%{transform:scale(1);} }

  /* ---------- Quest rank cards ---------- */
  .rank-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; width:100%; max-width:920px; }
  @media(max-width:860px){ .rank-grid{ grid-template-columns:1fr 1fr; } }
  @media(max-width:480px){ .rank-grid{ grid-template-columns:1fr; } }
  .rank-card{ padding:26px 18px 22px; text-align:center; cursor:pointer; transition:all .28s ease; border:1.5px solid rgba(150,170,255,.10); position:relative; }
  .rank-card:hover{ transform:scale(1.02); }
  .rank-card.dimmed{ opacity:.5; }
  .rank-card.active{ border-color:var(--cyan); animation:selectFlare .6s ease; }
  @keyframes selectFlare{ 0%{ box-shadow:0 0 0 0 var(--cyan-soft);} 55%{ box-shadow:0 0 0 18px rgba(47,230,255,0), 0 0 55px var(--cyan-soft);} 100%{ box-shadow:0 0 0 0 rgba(47,230,255,0), 0 0 34px var(--cyan-soft);} }
  .rank-tier{ font-family:var(--mono); font-size:11px; color:var(--text-dimmer); letter-spacing:.15em; }
  .rank-icon{ width:46px; height:46px; margin:14px auto; color:var(--text-dim); }
  .rank-card.active .rank-icon{ color:var(--cyan); }
  .rank-name{ font-weight:800; letter-spacing:.06em; font-size:15px; margin:0 0 6px; }
  .rank-desc{ font-size:12px; color:var(--text-dim); line-height:1.4; margin:0; }

  /* ---------- Vulnerability map ---------- */
  .map-shell{ width:100%; max-width:1040px; display:grid; grid-template-columns:1.1fr 1fr; gap:20px; align-items:stretch; }
  @media(max-width:820px){ .map-shell{ grid-template-columns:1fr; } }
  .map-left{ padding:22px; display:flex; flex-direction:column; align-items:center; }
  .map-right{ padding:22px; display:flex; flex-direction:column; }
  .view-caption{ display:flex; justify-content:space-between; width:100%; max-width:320px; font-family:var(--mono); font-size:11px; letter-spacing:.15em; color:var(--text-dimmer); margin-top:8px; text-transform:uppercase; }
  .joint-dot{ cursor:pointer; }
  .joint-ring-outer{ fill:none; stroke:var(--cyan); stroke-width:1.4; opacity:.55; }
  .joint-dot.active .joint-ring-outer{ stroke:var(--red); animation:ringPulse 1.3s ease-out infinite; }
  .joint-core{ fill:var(--cyan); opacity:.8; }
  .joint-dot.active .joint-core{ fill:var(--red); animation:blinkWarn 1.1s ease-in-out infinite; }
  @keyframes ringPulse{ 0%{ stroke-width:1.4; opacity:.9; r:9;} 100%{ stroke-width:.4; opacity:0; r:20;} }
  @keyframes blinkWarn{ 0%,100%{ opacity:1;} 50%{ opacity:.4;} }

  .constraints-list{ flex:1; overflow-y:auto; margin-top:6px; padding-right:2px; }
  .constraints-empty{ color:var(--text-dimmer); font-size:13.5px; text-align:center; padding:30px 10px; border:1px dashed var(--panel-border); border-radius:12px; }
  .badge-card{ border:1px solid rgba(255,90,90,.28); background:rgba(255,77,94,.06); border-radius:12px; padding:12px 14px; margin-bottom:10px; animation:fadeUp .3s ease; }
  .badge-pill{ display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.04em; color:var(--red); background:rgba(255,77,94,.14); border:1px solid rgba(255,77,94,.35); padding:4px 10px; border-radius:999px; margin-bottom:6px; }
  .badge-note{ font-size:12.5px; color:var(--text-dim); line-height:1.45; margin:0; }
  .badge-note b{ color:var(--green); font-weight:600; }

  .map-cta{ width:100%; max-width:1040px; margin-top:22px; padding:19px 20px; border:none; border-radius:14px; cursor:pointer; font-weight:800; letter-spacing:.06em; text-transform:uppercase; font-size:15px; color:#04121a;
    background:linear-gradient(90deg, var(--orange), var(--red)); box-shadow:0 0 26px rgba(255,90,90,.3); transition:all .3s; }
  .map-cta:hover{ box-shadow:0 0 34px rgba(255,90,90,.5), 0 0 60px var(--purple-soft); transform:translateY(-2px); }

  /* ---------- Complete screen ---------- */
  .complete-wrap{ width:100%; max-width:620px; text-align:center; }
  .complete-title{ font-size:clamp(28px,5vw,40px); font-weight:800; letter-spacing:.02em; background:linear-gradient(90deg,var(--green),var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent; margin:10px 0 4px; }
  .complete-sub{ color:var(--text-dim); font-size:14px; margin-bottom:26px; }
  .terminal{ text-align:left; background:rgba(0,0,0,.35); border:1px solid var(--panel-border); border-radius:14px; padding:18px 20px; font-family:var(--mono); font-size:12.5px; line-height:1.6; color:var(--green); max-height:280px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
  .terminal .k{ color:var(--cyan); }
  .restart-btn{ margin-top:22px; background:transparent; border:1px solid var(--panel-border); color:var(--text-dim); padding:12px 22px; border-radius:999px; cursor:pointer; font-size:13px; letter-spacing:.04em; transition:all .2s; }
  .restart-btn:hover{ color:var(--cyan); border-color:var(--cyan-soft); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }
</style>
</head>

/* ============================= ICONS ============================= */

  <svg viewBox="0 0 48 48" fill="none" className={className}>

function LoginPage({ onSubmit }){
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const [loading, setLoading] = useState(false);

  // Validation
  const validE = email.includes('@');
  const validP = password.length >= 6;
  const ready = validE && validP && !loading;

  const handleAuth = async () => {
    setLoading(true);
    setErrorMsg('');
    try {
      // 1. Try to sign in first
      const userCredential = await window.zephyrAuth.signIn(email, password);
      
      // Extract the part of the email before the '@' to use as the HUD username
      const usernameDisplay = userCredential.user.email.split('@')[0];
      onSubmit(usernameDisplay);
      
    } catch (error) {
      // 2. If the user doesn't exist, automatically register them
      if(error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
        try {
          const userCredential = await window.zephyrAuth.register(email, password);
          const usernameDisplay = userCredential.user.email.split('@')[0];
          onSubmit(usernameDisplay);
        } catch (regError) {
          setErrorMsg(regError.message);
        }
      } else {
        // Display any other errors (e.g., wrong password, rate limit)
        setErrorMsg(error.message.replace('Firebase: ', ''));
      }
    }
    setLoading(false);
  };

  return (
    <div className="screen">
      <div className="glass login-card">
        <BioCore size={92}/>
        <h1 className="brand-title">Zephyr</h1>
        <p className="brand-sub">Fit AI</p>

        <div className="field">
          <input
            id="email"
            type="email"
            value={email}
            onChange={e=>setEmail(e.target.value)}
            className={(validE?'valid ':'') + (email?'has-val':'')}
          />
          <label htmlFor="email">Email Address</label>
          <span className="check">&#10003;</span>
        </div>

        <div className="field">
          <input
            id="pw"
            type="password"
            value={password}
            onChange={e=>setPassword(e.target.value)}
            className={(validP?'valid ':'') + (password?'has-val':'')}
          />
          <label htmlFor="pw">Password</label>
          <span className="check">&#10003;</span>
        </div>

        {/* Error Message Display */}
        {errorMsg && (
          <p style={{color: 'var(--red)', fontSize: '13px', textAlign: 'center', marginBottom: '16px'}}>
            &#9888; {errorMsg}
          </p>
        )}

        <button className="cta-button" disabled={!ready} onClick={handleAuth}>
          {loading ? 'Authenticating...' : 'Start Your Journey'}
        </button>
        <p className="cta-sub">Valid email required · Password 6+ chars</p>
      </div>
    </div>
  );
}

const AGE_MIN = 14, AGE_MAX = 80, ITEM_W = 64;
function VitalsPage({ stats, setStats, onNext, onBack, xp, username }){
  const scrollerRef = useRef(null);
  const ages = useMemo(()=> Array.from({length: AGE_MAX-AGE_MIN+1}, (_,i)=> AGE_MIN+i), []);

  useEffect(()=>{
    if(scrollerRef.current){
      scrollerRef.current.scrollLeft = (stats.age - AGE_MIN) * ITEM_W;
    }
  }, []);

  const handleScroll = useCallback((e)=>{
    const idx = Math.round(e.target.scrollLeft / ITEM_W);
    const newAge = Math.min(Math.max(AGE_MIN+idx, AGE_MIN), AGE_MAX);
    setStats(s => s.age === newAge ? s : ({...s, age:newAge}));
  }, [setStats]);

  const nudge = (dir)=>{
    if(scrollerRef.current) scrollerRef.current.scrollBy({left: dir*ITEM_W, behavior:'smooth'});
  };

  const weightPct = ((stats.weightKg-30)/(180-30))*100;

  return (
    <div className="screen">
      <TopNav onBack={onBack} xp={xp} username={username} showBack/>
      <QuestHeader step={1} total={4} label="Character Creation"/>
      <span className="eyebrow" style={{textAlign:'center', width:'100%'}}>Vitals Scan</span>
      <h2 className="step-title" style={{textAlign:'center', width:'100%'}}>Calibrate Your Stats</h2>
      <p className="step-desc" style={{textAlign:'center', margin:'0 auto 28px'}}>These readings tune load, intensity and recovery pacing across your quest.</p>

      <div className="vitals-grid">
        <div className="glass panel-box age-wheel-wrap">
          <p className="panel-label">Age</p>
          <div className="age-readout">{stats.age}<span>YRS</span></div>
          <div style={{position:'relative'}}>
            <div className="age-center-marker"/>
            <div className="age-scroller" ref={scrollerRef} onScroll={handleScroll}>
              {ages.map(a => (
                <div key={a} className={"age-item" + (a===stats.age ? ' center':'')}>{a}</div>
              ))}
            </div>
          </div>
          <div className="age-ticks">
            <button className="age-nudge" onClick={()=>nudge(-1)}>&#8249;</button>
            <button className="age-nudge" onClick={()=>nudge(1)}>&#8250;</button>
          </div>
        </div>

        <div className="glass panel-box">
          <p className="panel-label">Weight</p>
          <div className="gauge-row">
            <div className="weight-scale-labels"><span>180</span><span>105</span><span>30</span></div>
            <div className="vgauge-wrap">
              <div className="vgauge-track"><div className="vgauge-fill" style={{height: weightPct+'%'}}/></div>
              <input type="range" min="30" max="180" value={stats.weightKg}
                onChange={e=>setStats(s=>({...s, weightKg:+e.target.value}))}/>
            </div>
            <div className="weight-readout">
              <div className="num">{stats.weightKg}</div>
              <div className="unit">KG</div>
            </div>
          </div>
        </div>
      </div>

      <button className="cta-button" style={{maxWidth:400, marginTop:34}} onClick={onNext}>Continue &#8594;</button>
    </div>
  );
}

/* ============================= APP ROOT (state machine + wipe transitions) ============================= */
const STAGE_ORDER = ['login','vitals','fuel','rank','map','complete'];
const XP_MAP = { login:0, vitals:100, fuel:200, rank:300, map:400, complete:500 };

function App(){
  const [stage, setStage] = useState('login');
  const [pending, setPending] = useState(null);
  const [wipeClass, setWipeClass] = useState('idle-left');

  const [payload, setPayload] = useState({
    account: { username: '' },
    stats: { age: 21, weightKg: 75, diet: null },
    activityRank: null,
    bodyConstraints: [],
  });

  const goTo = (next)=>{
    setPending(next);
    setWipeClass('cover');
  };

  const handleWipeEnd = ()=>{
    if(wipeClass === 'cover'){
      setStage(pending);
      setWipeClass('idle-right');
    } else if(wipeClass === 'idle-right'){
      setWipeClass('idle-right no-transition');
      requestAnimationFrame(()=> requestAnimationFrame(()=>{
        setWipeClass('idle-left no-transition');
        requestAnimationFrame(()=> requestAnimationFrame(()=> setWipeClass('idle-left')));
      }));
    }
  };

  const setStats = (updater)=> setPayload(p => ({...p, stats: typeof updater==='function' ? updater(p.stats) : updater}));
  const setDiet = (val)=> setPayload(p => ({...p, stats: {...p.stats, diet: val}}));
  const setRank = (val)=> setPayload(p => ({...p, activityRank: val}));
  const toggleJoint = (joint)=> setPayload(p => {
    const has = p.bodyConstraints.includes(joint.constraintId);
    return { ...p, bodyConstraints: has ? p.bodyConstraints.filter(c=>c!==joint.constraintId) : [...p.bodyConstraints, joint.constraintId] };
  });

  const idx = STAGE_ORDER.indexOf(stage);
  const goBack = ()=> idx>0 && goTo(STAGE_ORDER[idx-1]);
  const xp = XP_MAP[stage];

  const finish = ()=>{
    console.log('Zephyr onboarding payload:', JSON.parse(JSON.stringify(payload)));
    goTo('complete');
  };

  const restart = ()=>{
    setPayload({ account:{username:''}, stats:{age:21, weightKg:75, diet:null}, activityRank:null, bodyConstraints:[] });
    goTo('login');
  };

  let page;
  if(stage === 'login'){
    page = <LoginPage onSubmit={(username)=>{ setPayload(p=>({...p, account:{username}})); goTo('vitals'); }} />;
  } else if(stage === 'vitals'){
    page = <VitalsPage stats={payload.stats} setStats={setStats} onNext={()=>goTo('fuel')} onBack={goBack} xp={xp} username={payload.account.username}/>;
  } else if(stage === 'fuel'){
    page = <FuelPage diet={payload.stats.diet} setDiet={setDiet} onNext={()=>goTo('rank')} onBack={goBack} xp={xp} username={payload.account.username}/>;
  } else if(stage === 'rank'){
    page = <RankPage rank={payload.activityRank} setRank={setRank} onNext={()=>goTo('map')} onBack={goBack} xp={xp} username={payload.account.username}/>;
  } else if(stage === 'map'){
    page = <MapPage constraints={payload.bodyConstraints} toggleJoint={toggleJoint} onFinish={finish} onBack={goBack} xp={xp} username={payload.account.username}/>;
  } else {
    page = <CompletePage payload={payload} onRestart={restart}/>;
  }

  return (
    <React.Fragment>
      <AmbientBG/>
      <div className={"wipe-overlay " + wipeClass} onTransitionEnd={handleWipeEnd}/>
      <div key={stage}>{page}</div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
